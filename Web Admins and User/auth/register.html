<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityInsight Registration</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-functions-compat.js"></script>
    <style>
        /* Add your styles here */
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { margin-top: 50px; width: 300px; }
        .hidden { display: none; }
    </style>
</head>

<body>
    <div class="container">
        <form id="registrationForm">
            <h2>Register</h2>
            <input type="text" id="firstname" placeholder="First Name" required>
            <input type="text" id="lastname" placeholder="Last Name" required>
            <input type="text" id="address" placeholder="Address" required>
            <input type="text" id="contact" placeholder="Contact" required>
            <input type="text" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="button" id="submitData">Register</button>
        </form>

        <form id="verificationForm" class="hidden">
            <h2>Enter Verification Code</h2>
            <input type="text" id="verificationCode" placeholder="Verification Code" required>
            <button type="button" id="verifyCode">Verify Code</button>
        </form>

        <div id="successMessage" class="hidden">
            <h2>Registration Successful!</h2>
            <p>Welcome to CityInsight!</p>
        </div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const functions = firebase.functions();

        let generatedCode = "";

        // Send verification code to user's email
        async function sendVerificationCode(email) {
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            const sendEmail = functions.httpsCallable('sendVerificationEmail');
            try {
                await sendEmail({ email, code: generatedCode });
                alert("Verification code sent. Check your email.");
                document.getElementById("registrationForm").classList.add("hidden");
                document.getElementById("verificationForm").classList.remove("hidden");
            } catch (error) {
                console.error("Error sending verification code:", error.message);
                alert("Failed to send verification code. Please try again.");
            }
        }

        // Event listener for Register button
        document.getElementById("submitData").addEventListener("click", async function () {
            const email = document.getElementById("email").value;
            await sendVerificationCode(email);
        });

        // Event listener for Verify Code button
        document.getElementById("verifyCode").addEventListener("click", async function () {
            const firstname = document.getElementById("firstname").value;
            const lastname = document.getElementById("lastname").value;
            const address = document.getElementById("address").value;
            const contact = document.getElementById("contact").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const enteredCode = document.getElementById("verificationCode").value;

            if (enteredCode === generatedCode) {
                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const userId = userCredential.user.uid;

                    await db.collection("users").doc(userId).set({
                        firstname,
                        lastname,
                        address,
                        contact,
                        email,
                        status: "active"
                    });

                    document.getElementById("verificationForm").classList.add("hidden");
                    document.getElementById("successMessage").classList.remove("hidden");
                } catch (error) {
                    console.error("Error creating user:", error.message);
                    alert("Registration failed: " + error.message);
                }
            } else {
                alert("Incorrect verification code. Please try again.");
            }
        });
    </script>
</body>
</html>
