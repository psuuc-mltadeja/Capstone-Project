<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background-color: #3498db;
            color: #fff;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: 600;
        }
        .user-details {
            padding: 20px;
        }
        .user-details h3 {
            margin-bottom: 15px;
            color: #555;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .details-grid p {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
        }
        .images-section {
            margin-top: 20px;
            text-align: center;
        }
        .images-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }
        .image-container {
            text-align: center;
        }
        .image-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        .image-container p {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        .back-button {
            display: block;
            text-align: center;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #fff;
            color: #3498db;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #2874a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            User Details
        </div>
        <div id="userDetails" class="user-details">
            <!-- User details and images will be dynamically loaded here -->
        </div>
        <a href="#" class="back-button" onclick="window.history.back()">Go Back</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get the userId from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');

        // Function to load user details
        async function loadUserDetails() {
            if (userId) {
                const userDoc = await getDoc(doc(db, 'users', userId));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const userDetailsDiv = document.getElementById('userDetails');
                    userDetailsDiv.innerHTML = `
                        <h3>Personal Information</h3>
                        <div class="details-grid">
                            <p><strong>First Name:</strong> ${userData.firstname}</p>
                            <p><strong>Last Name:</strong> ${userData.lastname}</p>
                            <p><strong>Address:</strong> ${userData.address}</p>
                            <p><strong>Contact:</strong> ${userData.contact}</p>
                            <p><strong>Email:</strong> ${userData.email}</p>
                            <p><strong>Status:</strong> ${userData.status || 'N/A'}</p>
                            <p><strong>Verification:</strong> ${userData.isFullyVerified ? 'Verified' : 'Not Verified'}</p>
                        </div>
                        <div class="images-section">
                            <h3>Images</h3>
                            <div class="images-row">
                                <div class="image-container">
                                    ${userData.profileImageUrl 
                                        ? `<img src="${userData.idImageUrl}" alt="Profile Image">
                                           <p>Id Image</p>`
                                        : '<p>No Profile Image Available</p>'}
                                </div>
                                <div class="image-container">
                                    ${userData.faceImageUrl 
                                        ? `<img src="${userData.faceImageUrl}" alt="ID Image">
                                           <p>Face Image</p>`
                                        : '<p>No ID Image Available</p>'}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    alert('User not found!');
                }
            } else {
                alert('No user selected!');
            }
        }

        // Load the user details on page load
        loadUserDetails();
    </script>
</body>
</html>
