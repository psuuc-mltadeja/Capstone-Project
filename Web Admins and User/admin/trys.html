    <div class="main-content">
        <h1>Crime and Barangay Analytics</h1>
        <div class="content-container">
            <!-- Legend for the crime types -->
          <!-- Replace the current #legend-container with a dropdown -->
<div id="legend-container">
    <label for="barangay-select">Select Barangay:</label>
    <select id="barangay-select">
        <!-- Options will be dynamically added here -->
    </select>
</div>


            <!-- First chart: Crime types across Barangays -->
            <div class="chart-container">
                <canvas id="crimeTypeChart"></canvas>
            </div>

            <!-- Second chart: Crime count per Barangay -->
            <div class="chart-container">
                <canvas id="barangayChart"></canvas>
            </div>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let crimes = [];

        async function fetchCrimeData() {
            const crimesCollection = collection(db, "crimes");
            onSnapshot(crimesCollection, (snapshot) => {
                crimes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCrimeTypeChart();
                renderBarangayChart();
            });
        }

        function renderCrimeTypeChart() {
            const crimeCounts = {};
            crimes.forEach(crime => {
                const { type } = crime;
                if (!crimeCounts[type]) crimeCounts[type] = 0;
                crimeCounts[type]++;
            });

            const labels = Object.keys(crimeCounts);
            const colors = labels.map(label => getColor(label));
            const data = {
                labels,
                datasets: [{
                    label: 'Crime Types',
                    data: labels.map(label => crimeCounts[label]),
                    backgroundColor: colors,
                    borderColor: colors,
                    borderWidth: 1
                }]
            };

            if (window.myCrimeChart) {
                window.myCrimeChart.destroy();
            }

            const ctx = document.getElementById("crimeTypeChart").getContext("2d");
            window.myCrimeChart = new Chart(ctx, {
                type: "bar",
                data: data,
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }, // Disable Chart.js legend
                        title: { display: true, text: "Crime Types Across Barangays" }
                    },
                    scales: {
                        x: { stacked: true },
                        y: { beginAtZero: true, stacked: true }
                    }
                }
            });

            renderLegend(labels, colors);
        }

        function renderBarangayChart() {
    const barangayCounts = {};
    crimes.forEach(crime => {
        const { brgy } = crime;
        if (!barangayCounts[brgy]) barangayCounts[brgy] = 0;
        barangayCounts[brgy]++;
    });

    const labels = Object.keys(barangayCounts);
    
    // Generate unique colors for each Barangay
    const colors = labels.map(() => getRandomColor());

    const data = {
        labels,
        datasets: [{
            label: 'Crimes Per Barangay',
            data: labels.map(label => barangayCounts[label]),
            backgroundColor: colors,
            borderColor: colors,
            borderWidth: 1
        }]
    };

    if (window.myBarangayChart) {
        window.myBarangayChart.destroy();
    }

    const ctx = document.getElementById("barangayChart").getContext("2d");
    window.myBarangayChart = new Chart(ctx, {
        type: "pie",
        data: data,
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                title: { display: true, text: "Crimes Per Barangay" }
            }
        }
    });
}

// Function to generate a random color
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

        function renderLegend(labels, colors) {
            const legendContainer = document.getElementById("legend-container");
            legendContainer.innerHTML = ""; // Clear previous legends
            labels.forEach((label, index) => {
                const legendItem = document.createElement("div");
                legendItem.style.display = "flex";
                legendItem.style.alignItems = "center";
                legendItem.style.gap = "8px";

                const colorBox = document.createElement("div");
                colorBox.style.backgroundColor = colors[index];

                const labelText = document.createElement("span");
                labelText.textContent = label;

                legendItem.appendChild(colorBox);
                legendItem.appendChild(labelText);
                legendContainer.appendChild(legendItem);
            });
        }

        function getColor(label) {
            const colors = [
                "#e74c3c", "#3498db", "#f1c40f", "#2ecc71",
                "#9b59b6", "#34495e", "#95a5a6", "#e67e22"
            ];
            return colors[label.charCodeAt(0) % colors.length];
        }

        fetchCrimeData();
    </script>
