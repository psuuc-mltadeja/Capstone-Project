    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let archives = [];

        // Ensure user is logged in
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            }
        });

        async function fetchArchivedCrimes() {
            const archiveCollection = collection(db, "archive");
            onSnapshot(archiveCollection, (snapshot) => {
                archives = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                console.log("Fetched archived crimes:", archives); // Debugging log
                renderArchiveTable();
            });
        }

        function renderArchiveTable() {
            const tableBody = document.getElementById("archiveTableBody");
            tableBody.innerHTML = ""; 

            archives.forEach(archive => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${archive.brgy}</td>
                    <td>${archive.details}</td>
              
                    <td>${archive.type}</td>
                    <td>
                        <button onclick="confirmRestore('${archive.id}')">Restore</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            // Destroy the previous DataTable instance before reinitializing
            if ($.fn.DataTable.isDataTable('#archiveTable')) {
                $('#archiveTable').DataTable().destroy();
            }

            $('#archiveTable').DataTable(); // Reinitialize DataTable
        }

        // Confirmation dialog before restoring
        window.confirmRestore = function(id) {
            Swal.fire({
                title: 'Are you sure?',
                text: "This crime will be restored to the active database.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes, restore it!',
                cancelButtonText: 'No, cancel!',
            }).then((result) => {
                if (result.isConfirmed) {
                    restoreCrime(id); // Call restoreCrime if confirmed
                }
            });
        };

        // Define restoreCrime in the global scope
        window.restoreCrime = async function(id) {
            try {
                console.log(`Restoring crime with ID: ${id}`);  // Debugging log
                const archiveRef = doc(db, "archive", id);
                const archiveDoc = archives.find(archive => archive.id === id);
                
                console.log(`Fetched archive document:`, archiveDoc); // Debugging log

                // Ensure the document exists in the archives
                if (!archiveDoc) {
                    throw new Error("Archive document not found.");
                }

                // Add to "crimes" collection
                await addDoc(collection(db, "crimes"), {
                    brgy: archiveDoc.brgy,
                    details: archiveDoc.details,
                    latitude: archiveDoc.latitude,
                    longitude: archiveDoc.longitude,
                    type: archiveDoc.type
                });

                console.log(`Document restored to crimes collection successfully`); // Debugging log

                // Delete from "archive" collection
                await deleteDoc(archiveRef);
                
                console.log(`Document deleted from archive collection successfully`); // Debugging log
                
                Swal.fire('Restored!', 'The crime has been restored to the active database.', 'success');

                // Refresh the archived crimes table
                fetchArchivedCrimes(); // Call to refresh the table
            } catch (error) {
                console.error("Error restoring crime:", error); // Log the error
                Swal.fire('Error', 'There was an issue restoring the crime. Please try again.', 'error');
            }
        };

        window.onload = fetchArchivedCrimes;
    </script>
