<script>
    var map = L.map('map').setView([15.9805, 120.5581], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
    }).addTo(map);

    var redIcon = new L.Icon({
      iconUrl: 'mark.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
      shadowSize: [41, 41]
    });

    // Variable to hold the marker
    let marker;

    // Function to handle map click
    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;
      const addressInput = document.getElementById('address');
      const latitudeInput = document.getElementById('latitude');
      const longitudeInput = document.getElementById('longitude');
      const dateInput = document.getElementById('crimeDate');

      // Update latitude and longitude input fields
      latitudeInput.value = lat;
      longitudeInput.value = lng;

      // Set current date and time in the date input field
      const currentDate = new Date().toLocaleString();
      dateInput.value = currentDate;

      // Fetch address from latitude and longitude
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
        .then(response => response.json())
        .then(data => {
          if (data && data.address) {
            addressInput.value = data.display_name;
          } else {
            addressInput.value = 'Address not found';
          }
        });

      // Remove the existing marker if it exists
      if (marker) {
        map.removeLayer(marker);
      }

      // Add a marker at the clicked location
      marker = L.marker([lat, lng], { icon: redIcon }).addTo(map);
    });

    // Save crime data to Firestore with confirmation
    document.getElementById('saveCrime').addEventListener('click', () => {
      const crimeDate = document.getElementById('crimeDate').value;
      const crimeDescription = document.getElementById('crimeDescription').value;
      const latitude = document.getElementById('latitude').value;
      const longitude = document.getElementById('longitude').value;
      const address = document.getElementById('address').value;

      // Show confirmation dialog
      Swal.fire({
          title: 'Are you sure?',
          text: "Do you want to add this flood report?",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#3085d6',
          cancelButtonColor: '#d33',
          confirmButtonText: 'Yes, add it!'
      }).then((result) => {
          if (result.isConfirmed) {
              // Save to Firestore
              db.collection("floods").add({
                  date: crimeDate,
                  details: crimeDescription,
                  latitude: parseFloat(latitude),
                  longitude: parseFloat(longitude),
                  brgy: address
              }).then(() => {
                  Swal.fire(
                      'Added!',
                      'Flood report has been added successfully.',
                      'success'
                  );
                  // Reset fields
                  document.getElementById('crimeDate').value = '';
                  document.getElementById('crimeDescription').value = '';
                  document.getElementById('latitude').value = '';
                  document.getElementById('longitude').value = '';
                  document.getElementById('address').value = '';
                  if (marker) {
                      map.removeLayer(marker); // Remove the marker after saving
                  }
              }).catch((error) => {
                  console.error("Error adding flood report: ", error);
                  Swal.fire(
                      'Error!',
                      'There was an error adding the flood report.',
                      'error'
                  );
              });
          }
      });
    });
</script>
