<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityInsight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
        }
        
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar a {
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            color: #1da1f2;
        }

        .sidebar a i {
            margin-right: 10px;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1da1f2;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .logout {
            color: #1da1f2;
            cursor: pointer;
        }

        #map {
            height: 100vh;
            width: calc(100% - 250px);
            background-color: #eaeaea;
        }

        .add-button {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #1da1f2;
            border: none;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 17px;
            text-decoration: none;
            height: 50px; 
        }
        
        .add-button:hover {
            background-color: #148cc0;
        }
        .sidebar a.active {
            color: #1da1f2;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="logo" onclick="window.location.href='home.html';"><span style="color: white">City</span>Insight</div>
            <a href="posttext.html" class="add-button">+ CREATE POST</a>
            <a href="profile.html" class="active"><i class="fas fa-user-circle" style="margin-right: 10px;"></i>&nbsp;Profile</a>
            <a href="#"><i class="fas fa-bell" style="margin-right: 10px;"></i>&nbsp;Notifications</a>
            <a href="profile.html"><i class="fas fa-user-box"></i>&nbsp;Messages</a>
         
            <a href="crimes.html"><i class="fas fa-exclamation-triangle" style="margin-right: 10px;"></i>&nbsp;Crimes</a>
                   
            <a href="crimes.html"><i class="fas fa-exclamation-triangle" style="margin-right: 10px;"></i>&nbsp;Natural Disaster</a>
        
            <a href="#"><i class="fas fa-cog" style="margin-right: 10px;"></i>&nbsp;Services</a>
            
            <a href="#"><i class="fas fa-info-circle" style="margin-right: 10px;"></i>&nbsp;About</a>
            <a href="#"><i class="fas fa-logout" style="margin-right: 10px;"></i>&nbsp;Logout</a>
        </div>
        <div>
            <a href="login.html" class="logout">Log out</a>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
        authDomain: "cityinsight-61c09.firebaseapp.com",
        projectId: "cityinsight-61c09",
        storageBucket: "cityinsight-61c09.appspot.com",
        messagingSenderId: "230924032629",
        appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
        measurementId: "G-VV7WJRCEZ0"
      };

      const app = firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>


    <script>
      var map = L.map('map').setView([15.9805, 120.5581], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
      }).addTo(map);


      db.collection("floods").get().then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const lat = data.latitude;
            const lng = data.longitude;
            const brgy = data.brgy;
            const date = data.date; 
            const details = data.details;
    
            const popupContent = 
            '<div class="info_content">' +
            '<h2 style="color: #1da1f2; text-align: center; margin-bottom: 10px;">Flood Reports</h2>' +
            '<h3 style="margin: 0;"><strong>Barangay Affected:</strong> ' + brgy + ' </h3>' +
            '<p style="margin: 0; padding: 0;"><strong>Details:</strong> ' + details + '</p>' +  
            '<p style="margin: 0; padding: 0;"><strong>Date Tagged:</strong> ' + date + '</p>' + 
            '</div>';
    
            L.marker([lat, lng]).addTo(map)
                .bindPopup(popupContent) 
                .openPopup();
        });
    }).catch((error) => {
        console.error("Error fetching data: ", error);
    });
    </script>
</body>

</html>
