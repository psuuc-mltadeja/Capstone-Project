<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityInsight</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        /* Add your CSS here */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #032861 45%, #0e70d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #1a1a1a;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-size: 24px;
        }

        .navbar .brand-name span {
            color: #0e70d1;
        }

        .container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #0e70d1;
        }

        input[type="text"],
        input[type="password"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 100px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            text-align: center;
            color: black;
            border-radius: 5px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h1 class="brand-name"><a href="#">City<span>Insight</span></a></h1>
    </nav>

    <div class="container">
        <form id="registrationForm">
            <input type="text" name="firstname" id="firstname" placeholder="First Name" required>
            <input type="text" name="lastname" id="lastname" placeholder="Last Name" required>
            <input type="text" name="address" id="address" placeholder="Address" required>
            <input type="text" name="contact" id="contact" placeholder="Contact" required>
            <input type="text" name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="button" id="submitData">Register</button>
        </form>
    </div>

    <!-- Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Registration Pending!</h2>
            <p>Please check your email to verify your account. Once verified, your registration will be complete.</p>
        </div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
        apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
        authDomain: "cityinsight-61c09.firebaseapp.com",
        databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cityinsight-61c09",
        storageBucket: "cityinsight-61c09.appspot.com",
        messagingSenderId: "230924032629",
        appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
        measurementId: "G-VV7WJRCEZ0"
    };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Modal handling
        const modal = document.getElementById("successModal");
        const closeModal = document.getElementsByClassName("close")[0];

        document.getElementById("submitData").addEventListener("click", async function () {
            const firstname = document.getElementById("firstname").value;
            const lastname = document.getElementById("lastname").value;
            const address = document.getElementById("address").value;
            const contact = document.getElementById("contact").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                // Create a new user in Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Send email verification
                await user.sendEmailVerification();

                // Show modal asking user to verify email
                modal.style.display = "block";

                // Store user data temporarily in sessionStorage
                sessionStorage.setItem("tempUserData", JSON.stringify({
                    uid: user.uid,
                    firstname,
                    lastname,
                    address,
                    contact,
                    email
                }));

            } catch (error) {
                console.error("Error creating user:", error.message);
                alert("Registration failed: " + error.message);
            }
        });

        // Listen for authentication state changes
        auth.onAuthStateChanged(async function (user) {
            // Check if the user has verified their email
            if (user && user.emailVerified) {
                // Retrieve user data from sessionStorage
                const userData = JSON.parse(sessionStorage.getItem("tempUserData"));
                
                if (userData && userData.uid === user.uid) {
                    // Save verified user details to Firestore
                    await db.collection("users").doc(user.uid).set({
                        firstname: userData.firstname,
                        lastname: userData.lastname,
                        address: userData.address,
                        contact: userData.contact,
                        email: userData.email,
                        status: "active"
                    });
                    
                    // Clear temporary data
                    sessionStorage.removeItem("tempUserData");

                    alert("Your account is now verified and registered.");
                }
            }
        });

        // Modal close
        closeModal.onclick = function () {
            modal.style.display = "none";
        };

        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };
    </script>
</body>

</html>
