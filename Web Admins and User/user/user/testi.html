<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Testimonial</title>
    <style>
        /* Add your existing styles or adjust as necessary */
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .form-group textarea {
            height: 150px;
            resize: none;
        }

        .buttons {
            display: flex;
            justify-content: flex-end;
        }

        .buttons button {
            background-color: #1da1f2;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
        }

        .buttons button:hover {
            background-color: #148cc0;
        }
    </style>
</head>
<body>

    <h2>Submit Your Testimonial</h2>

    <div class="form-group">
        <input type="text" id="testimonialName" placeholder="Your Name" required>
    </div>

    <div class="form-group">
        <textarea id="testimonialContent" placeholder="Your Testimonial" required></textarea>
    </div>

    <div class="buttons">
        <button id="submitTestimonialButton">Submit Testimonial</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-app.js';
        import { getFirestore, collection, addDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "835973145975",
            appId: "1:835973145975:web:a23e1a13c19f090c1f953d",
            measurementId: "G-8NQPLF9P0J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('submitTestimonialButton').addEventListener('click', async (e) => {
            e.preventDefault();

            const name = document.getElementById('testimonialName').value;
            const content = document.getElementById('testimonialContent').value;

            if (!name || !content) {
                alert('Both name and content are required.');
                return;
            }

            try {
                // Get the current timestamp
                const currentTimestamp = Timestamp.now();

                // Save the testimonial data to Firestore
                const docRef = await addDoc(collection(db, 'testimonials'), {
                    name: name,
                    content: content,
                    date: currentTimestamp // Store current timestamp in Firestore
                });

                alert('Testimonial submitted successfully!');
            } catch (error) {
                console.error('Error submitting testimonial:', error);
                alert('Failed to submit testimonial.');
            }
        });
    </script>

</body>
</html>
