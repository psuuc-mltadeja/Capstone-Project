    const app = initializeApp(firebaseConfig);

    // Fetch and render the chart data
    async function fetchCrimeData(crimeType) {
        crimeData = {};
        const crimesCollection = collection(db, "crimes");
        const lowerCaseCrimeType = crimeType.toLowerCase();
        const q = query(crimesCollection, where("type", "==", lowerCaseCrimeType));
        const querySnapshot = await getDocs(q);

        querySnapshot.forEach(doc => {
            const crime = doc.data();
            const brgy = crime.brgy;

            if (!crimeData[brgy]) {
                crimeData[brgy] = 1;
            } else {
                crimeData[brgy]++;
            }
        });

        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('crimeChart').getContext('2d');
        const barangays = Object.keys(crimeData);
        const counts = Object.values(crimeData);

        if (crimeChart) {
            crimeChart.destroy();
        }

        crimeChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: barangays,
                datasets: [{
                    label: 'Number of Crimes',
                    data: counts,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                if (Number.isInteger(value)) {
                                    return value;
                                }
                            }
                        }
                    }
                }
            }
        });
    }

    // Fetch data on button click
    function handleSubmit() {
        const crimeTypeInput = document.getElementById('crimeType').value;
        if (crimeTypeInput) {
            fetchCrimeData(crimeTypeInput);
        } else {
            alert('Please enter a valid crime type.');
        }
    }

    // Monitor new reports in real-time
// Monitor new reports in real-time

// Combined monitoring function
// Combined monitoring function for reports and SOS with specific conditions
// Monitor new reports and SOS requests in real-time
function monitorNewReportsAndSOS() {
    const reportsCollection = collection(db, "reports");
    const sosReportsCollection = collection(db, "sosreqs");

    let newReport = null;
    let newSOS = null;

    // Monitor for new reports with "pending" status
    onSnapshot(reportsCollection, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const reportData = change.doc.data();
                if (reportData.status === "pending") {
                    newReport = reportData; // Store new pending report
                }
            }
        });

        // After processing the snapshot, show the alert if necessary
        checkAndShowAlert(newReport, newSOS);
    });

    // Monitor for new SOS with "pending" status
    onSnapshot(sosReportsCollection, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const sosData = change.doc.data();
                if (sosData.status === "pending") {
                    newSOS = sosData; // Store new pending SOS request
                }
            }
        });

        // After processing the snapshot, show the alert if necessary
        checkAndShowAlert(newReport, newSOS);
    });
}

// Helper function to check and display SweetAlert notifications
function checkAndShowAlert(newReport, newSOS) {
    if (newReport || newSOS) {
        let alertMessage = "You have new notifications:\n";
        let footerContent = "";

        // If there is a new pending report
        if (newReport && !newSOS) {
            alertMessage = `New pending report: ${newReport.type || 'Unknown type'}`;
            footerContent = `<button class="swal2-confirm" style="background-color:#3498db" onclick="window.location.href='reports.html'">View Reports</button>`;
        }
        // If there is a new pending SOS
        else if (!newReport && newSOS) {
            alertMessage = `New pending SOS: ${newSOS.location || 'Unknown location'}`;
            footerContent = `<button class="swal2-confirm" style="background-color:#e74c3c" onclick="window.location.href='sos.html'">View SOS</button>`;
        }
        // If both pending report and SOS are present
        else if (newReport && newSOS) {
            alertMessage = "You have new pending reports and SOS alerts.";
            footerContent = `
                <button class="swal2-confirm" style="background-color:#3498db" onclick="window.location.href='reports.html'">View Reports</button>
                <button class="swal2-confirm" style="background-color:#e74c3c" onclick="window.location.href='sos.html'">View SOS</button>
            `;
        }

        // Display the alert with the customized footer
        Swal.fire({
            title: 'New Pending Alerts!',
            text: alertMessage,
            icon: 'info',
         
            footer: footerContent
        });
    }
}

// Start monitoring for new pending reports and SOS requests
monitorNewReportsAndSOS();



// Function to monitor and update pending reports count
function monitorPendingReports() {
    const reportsCollection = collection(db, "reports");

    onSnapshot(reportsCollection, (snapshot) => {
        let pendingCount = 0;

        snapshot.forEach((doc) => {
            const report = doc.data();
            if (report.status && report.status.toLowerCase() === "pending") {
                pendingCount++;
            }
        });

        // Update the Incident Reports link with the pending count
        updatePendingReportsCount(pendingCount);
    });
}

// Function to update the pending reports count in the sidebar
function updatePendingReportsCount(pendingCount) {
    const pendingReportsCount = document.getElementById("pendingReportsCount");

    if (pendingCount > 0) {
        // Show the count if there are pending reports
        pendingReportsCount.innerText = pendingCount;
        pendingReportsCount.style.display = "inline-block";  // Make sure the badge is visible
    } else {
        // If no pending reports, hide the badge
        pendingReportsCount.innerText = '';
        pendingReportsCount.style.display = "none";
    }
}

// Start monitoring pending reports
monitorPendingReports();


    // Update user info boxes
    async function updateInfoBoxes() {
        const fetchCount = async (collectionName) => {
            const snapshot = await getDocs(collection(db, collectionName));
            return snapshot.size;
        };

        document.getElementById('userCount').innerText = await fetchCount("users");
        document.getElementById('crimeCount').innerText = await fetchCount("crimes");
        document.getElementById('floodCount').innerText = await fetchCount("floods");
        document.getElementById('sosCount').innerText = await fetchCount("sosreqs");
    }

    window.onload = async () => {
        document.getElementById('fetchCrimeBtn').addEventListener('click', handleSubmit);
        await updateInfoBoxes();
        monitorNewReports(); // Start monitoring for new reports
    };

    // Logout functionality

                window.location.href = "login.html";
            })
            .catch((error) => {
                console.error("Error signing out: ", error);
            });
    });
