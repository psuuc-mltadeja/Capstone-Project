<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityInsight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
        }
        
        .sidebar {
            width: 250px;
            position: fixed;
            z-index: 100;
            width: 250px;
            height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar a {
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            color: #1da1f2;
        }

        .sidebar a i {
            margin-right: 10px;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1da1f2;
            margin-bottom: 30px;
            cursor: pointer;
        }

        #map {
            height: 100vh;
            width: calc(100% - 250px);
            background-color: #eaeaea;
            position: relative;
            right: -250px;
        }

        .add-button {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #1da1f2;
            border: none;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 17px;
            text-decoration: none;
            height: 50px; 
        }
        
        .add-button:hover {
            background-color: #148cc0;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div>
        <div class="logo" onclick="window.location.href='home.html';">
            <span style="color: white">City</span>Insight
        </div>
        <a href="posttext.html" class="add-button">
            <i class="fas fa-plus-circle"></i>&nbsp; CREATE POST
        </a>
        <a href="home.html" id="active">
            <i class="fa fa-users"></i>&nbsp; Community
        </a>
        <a href="profile.html">
            <i class="fas fa-user"></i>&nbsp; Profile
        </a>
  
        <a href="crimes.html">
            <i class="fas fa-exclamation-triangle"></i>&nbsp; Crimes
        </a>
  
        <a href="flood.html">
            <i class="fas fa-water"></i>&nbsp; Flood
        </a>
        <a href="evacs.html">
            <i class="fas fa-map"></i>&nbsp; Evacuation Area
        </a>
        <a href="hospitals.html">
            <i class="fas fa-map"></i>&nbsp; Hospitals
        </a>
     
        <a href="reports.html">
          <i class="fas fa-exclamation-triangle"></i>&nbsp; Reports
      </a>
      
        <a href="about.html">
            <i class="fas fa-info-circle"></i>&nbsp; About
        </a>
        <a href="add-testimonial.html">
          <i class="fas fa-share"></i>&nbsp; Share your experience to us
      </a>
        <a href="login.html">
            <i class="fas fa-sign-out-alt"></i>&nbsp; Logout
        </a>
        </div>
    </div>
    <div id="map"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-firestore-compat.js"></script>

    <!-- Leaflet.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };
        
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Initialize map
        var map = L.map('map').setView([15.9805, 120.5581], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
        }).addTo(map);
        
        // Marker Icons for Pending and Approved
        var pendingIcon = new L.Icon({
            iconUrl: 'https://icons.iconarchive.com/icons/paomedia/small-n-flat/512/map-marker-icon.png', // Use your own icon URL
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            className: 'pending-icon' // Use this class to style for pending status
        });
        
        var approvedIcon = new L.Icon({
            iconUrl: 'https://cdn1.iconfinder.com/data/icons/color-bold-style/21/14_1-512.png', // Use your own icon URL
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            className: 'approved-icon' // Use this class to style for approved status
        });
        
        // Function to format Firestore timestamp into a human-readable format
        function formatDate(date) {
            if (date instanceof firebase.firestore.Timestamp) {
                date = date.toDate(); // Convert Firestore timestamp to JavaScript Date
            }
            
            // Format the date as a human-readable string
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: 'numeric', 
                minute: 'numeric', 
                second: 'numeric', 
                hour12: true 
            };
            return date.toLocaleString('en-US', options); // You can adjust the locale as needed
        }
        
        // Function to fetch and display crime markers with different icons based on the status
        function loadCrimeMarkers() {
            // Clear existing markers
            map.eachLayer(function(layer) {
                if (layer instanceof L.Marker) {
                    map.removeLayer(layer);
                }
            });
        
            db.collection("reports").get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const lat = data.latitude;
                    const lng = data.longitude;
                    const type = data.body;
                    const brgy = data.title;
                    const date = formatDate(data.date); // Use the formatDate function to convert to human-readable format
                    const status = data.status; // Status field: "approved" or "pending"
        
                    // Only display the markers if the status is 'approved' or 'pending'
                    if (status !== 'approved' && status !== 'pending') {
                        return; // Skip markers that are not 'approved' or 'pending'
                    }
        
                    // Popup content for each crime
                    const popupContent =
                        '<div class="info_content">' +
                        '<h2 style="color: #e01010; text-align: center; margin-bottom: 10px;">Crime Reports</h2>' +
                        '<h3 style="margin: 0;"><strong>Crime Data:</strong> ' + brgy + ' </h3>' +
                        '<p style="margin: 0;"><strong>Crime Details:</strong> ' + type + ' </p>' +
                        '<p style="margin: 0;"><strong>Date Tagged:</strong> ' + date + '</p>' +
                        '<p style="margin: 0;"><strong>Status:</strong> ' + status.charAt(0).toUpperCase() + status.slice(1) + '</p>' +
                        "</div>";
        
                    // Choose the correct icon based on the status
                    let markerIcon;
                    if (status === 'approved') {
                        markerIcon = approvedIcon; // Red for approved
                    } else if (status === 'pending') {
                        markerIcon = pendingIcon; // Orange for pending
                    }
        
                    // Add the marker to the map with the selected icon
                    L.marker([lat, lng], { icon: markerIcon }).addTo(map)
                        .bindPopup(popupContent);
                });
            }).catch((error) => {
                console.error("Error fetching data: ", error);
            });
        }
        
        // Call the function to load crime markers
        loadCrimeMarkers();
        setInterval(loadCrimeMarkers, 5000);
        </script>
        
    <!-- JavaScript File -->
    <script src="app.js"></script>
</body>

</html>
