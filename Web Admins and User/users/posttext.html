<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <title>CityInsight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
        }
        
        .sidebar {
            position: fixed;
            z-index: 100;
            width: 250px;
            height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar a {
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            color: #1da1f2;
        }

        .sidebar a i {
            margin-right: 10px;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1da1f2;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .logout {
            color: #1da1f2;
            cursor: pointer;
        }

        .sidebar #active {
            color: #1da1f2;
            font-weight: bold;
        }

        .content {
            width: 70%;
            position: relative;
            right: -320px;
            top: 40px;
            padding: 40px;
            background-color: #333;
        }

        .content h2 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tab {
            margin-right: 20px;
            cursor: pointer;
            font-size: 18px;
            padding-bottom: 5px;
        }

        .tab a {
            color: #fff; 
            text-decoration: none; 
        }      

        .tab a:hover {
            color: #1da1f2;
        } 

        .tab.active {
            border-bottom: 3px solid #1da1f2;
            color: #1da1f2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .form-group textarea {
            height: 150px;
            resize: none;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #888;
        }

        .buttons {
            display: flex;
            justify-content: flex-end;
        }

        .buttons button {
            background-color: #1da1f2;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
        }

        .buttons button:hover {
            background-color: #148cc0;
        }

        .add-button {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #1da1f2;
            border: none;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 17px;
            text-decoration: none;
            height: 50px; 
        }
        
        .add-button:hover {
            background-color: #148cc0;
        }

        .modal {
            display: none;
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0, 0, 0, 0.5); 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content {
            background-color: #1da1f2;
            color: #fff; 
            border-radius: 8px;
            padding: 20px;
            width: 300px;
            text-align: center;
            position: relative;
        }
        .close {
            color: white; 
            float: right; 
            font-size: 28px; 
            font-weight: bold; 
        }
        .close:hover,
        .close:focus {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
          <div class="logo" onclick="window.location.href='home.html';"><span style="color: white">City</span>Insight</div>
          <a href="posttext.html" class="add-button">+ CREATE POST</a>
          <a href="home.html"><i class="fas fa-users"></i>&nbsp;Community</a>
          <a href="profile.html" class="active"><i class="fas fa-user-circle" style="margin-right: 10px;"></i>&nbsp;Profile</a>
          <a href="#"><i class="fas fa-bell" style="margin-right: 10px;"></i>&nbsp;Notifications</a>
          <a href="#"><i class="fas fa-envelope"></i>&nbsp;Messages</a>
          <a href="crimes.html"><i class="fas fa-exclamation-triangle" style="margin-right: 10px;"></i>&nbsp;Crimes</a>
          <a href="#"><i class="fas fa-exclamation-triangle" style="margin-right: 10px;"></i>&nbsp;Natural Disaster</a>
          <a href="flood.html"><i class="fas fa-cloud-showers-heavy" style="margin-right: 10px;"></i>&nbsp;Flood</a>
          <a href="#"><i class="fas fa-cog" style="margin-right: 10px;"></i>&nbsp;Services</a>
          <a href="#"><i class="fas fa-info-circle" style="margin-right: 10px;"></i>&nbsp;About</a>
          <a href="login.html"><i class="fas fa-sign-out" style="margin-right: 10px;"></i>&nbsp;Logout</a>
        </div>
    </div>

    <div class="content">
        <h2>Create post</h2>

        <div class="tabs">
            <div class="tab active">Text</div>
            <div class="tab"><a href="postimage.html">Images & Video</a></div>
            <div class="tab"><a href="postlink.html">Link</a></div>
        </div>

        <div class="form-group">
            <input type="text" placeholder="Title" id="title" required>
        </div>
        
        <div class="form-group">
            <textarea placeholder="Body" id="body" required></textarea>
        </div>

        <div class="buttons">
            <button type="button" id="save-draft">Save Draft</button>
            <button type="button" id="post">Post</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <p id="modalMessage"></p> 
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore.js';
    
        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            databaseURL: "https://cityinsight-61c09-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };
    
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
    
        let userData = null; 
    
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDoc);
    
                if (!docSnap.exists()) {
                    await setDoc(userDoc, {
                        firstname: user.displayName || "Default Name",
                        email: user.email || "default@example.com",
                    });
                    console.log('New user document created:', user.uid);
                }
    
                userData = (await getDoc(userDoc)).data();
                console.log('User data:', userData);
            } else {
                console.log('User is signed out');
            }
        });
    
        document.getElementById('save-draft').onclick = async () => {
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            const user = auth.currentUser;
    
            if (!title.trim() || !body.trim()) {
                openModal("Title and Body are required!");
                return;
            }
    
            if (user) {
                const draftsRef = collection(db, 'drafts');
                await addDoc(draftsRef, {
                    title,
                    body,
                    username: userData.firstname, 
                    date: serverTimestamp()
                });
                openModal("Draft saved successfully!");
            } else {
                openModal("Please log in to save drafts.");
            }
        };
    
        document.getElementById('post').onclick = async () => {
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            const user = auth.currentUser;
    
            if (!title.trim() || !body.trim()) {
                openModal("Title and Body are required!");
                return; 
            }
    
            if (user) {
                const postsRef = collection(db, 'crowdsourcing');
                await addDoc(postsRef, {
                    title,
                    body,
                    username: userData.firstname, 
                    date: serverTimestamp()
                });
                openModal("Post created successfully!");
            } else {
                openModal("Please log in to create posts.");
            }
        };
    
        function openModal(message) {
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('modal').style.display = 'flex';
            console.log("Modal opened with message:", message);
        }
    
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    
        document.getElementById('closeModal').onclick = closeModal;
    
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" crossorigin="anonymous"></script>
</body>
</html>
