    <!-- Leaflet Routing Machine -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.2/dist/leaflet-routing-machine.js"></script>

    <script>
      var map = L.map('map').setView([15.9805, 120.5581], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
      }).addTo(map);

      var redIcon = new L.Icon({
        iconUrl: 'https://www.pngplay.com/wp-content/uploads/9/Map-Marker-Transparent-File.png', 
    
        iconSize: [25, 41],
        iconAnchor: [12, 41], 
        popupAnchor: [1, -34],
        shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
        shadowSize: [41, 41]
      });

      // Function to calculate distance in meters between two lat/lng points
      function getDistance(lat1, lng1, lat2, lng2) {
        const userLoc = L.latLng(lat1, lng1);
        const evacLoc = L.latLng(lat2, lng2);
        return userLoc.distanceTo(evacLoc); // Returns distance in meters
      }

      // Function to fetch and display nearest evacuation area with route
      function loadNearestEvacuationArea() {
        // Get user location
        navigator.geolocation.getCurrentPosition(function(position) {
          const userLat = position.coords.latitude;
          const userLng = position.coords.longitude;

          let nearestDistance = Infinity;
          let nearestEvac = null;

          db.collection("evacs").get().then((querySnapshot) => {
            querySnapshot.forEach((doc) => {
              const evacData = doc.data();
              const evacLat = evacData.latitude;
              const evacLng = evacData.longitude;

              // Calculate distance from user to evacuation area
              const distance = getDistance(userLat, userLng, evacLat, evacLng);

              // Track nearest evacuation area
              if (distance < nearestDistance) {
                nearestDistance = distance;
                nearestEvac = evacData;
              }
            });

            // If a nearest evacuation area is found, display it and draw polyline with routing
            if (nearestEvac) {
              const evacLat = nearestEvac.latitude;
              const evacLng = nearestEvac.longitude;

              // Add marker for the nearest evacuation area
              L.marker([evacLat, evacLng]).addTo(map)
                .bindPopup('<strong>Nearest Evacuation Area</strong>');
              map.setView([evacLat, evacLng], 13);  // Center map on nearest evac area

              // Draw route from user to evacuation area using Leaflet Routing Machine
              const userLocation = L.latLng(userLat, userLng);
              const evacLocation = L.latLng(evacLat, evacLng);

              L.Routing.control({
                waypoints: [userLocation, evacLocation],
                routeWhileDragging: true,
              }).addTo(map);
            }
          });
        });
      }

      loadNearestEvacuationArea();  // Call the function on page load
      document.querySelector('.submenu > a').addEventListener('click', function (e) {

    const submenuList = this.nextElementSibling; // Get the submenu
    submenuList.style.display = submenuList.style.display === 'block' ? 'none' : 'block';
});

    </script>
