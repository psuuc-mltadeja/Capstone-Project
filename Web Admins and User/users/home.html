        <style>

    .comment-author-image {

    textarea {

    }

    /* Modal styles */

        }

        }

        .add-comment-btn {

            cursor: pointer;

        .add-comment-btn:hover {

    <body>

        <div class="sidebar">
            <div>
            <div class="logo" onclick="window.location.href='home.html';">

        <div class="content" id="content">
            <!-- Posts will be dynamically inserted here -->
        </div>

    <!-- Modal Structure -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <div id="modal-body">
                <!-- Dynamic content will be inserted here -->
            </div>
            <div class="modal-actions">
                <button id="confirm-action" class="add-comment-btn">Confirm</button>
                <button id="cancel-action" class="add-comment-btn">Cancel</button>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-app.js';
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, query, where, doc, updateDoc, deleteDoc, increment } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/9.21.0/firebase-auth.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
            authDomain: "cityinsight-61c09.firebaseapp.com",
            projectId: "cityinsight-61c09",
            storageBucket: "cityinsight-61c09.appspot.com",
            messagingSenderId: "230924032629",
            appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
            measurementId: "G-VV7WJRCEZ0"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const fetchContent = async () => {
            const contentDiv = document.getElementById('content');
            const querySnapshot = await getDocs(collection(db, "crowdsourcing"));
            
            contentDiv.innerHTML = '';
        
            const posts = [];
        
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                posts.push({ id: doc.id, ...data });
            });
        
            posts.sort((a, b) => b.date.toMillis() - a.date.toMillis());
        
            posts.forEach((data) => {
                const postElement = document.createElement('div');
                postElement.className = 'post'; 
        
                // Fetch and display comments
                fetchComments(data.id).then(commentsHtml => {
                    postElement.innerHTML = 
                        `<div class="post-header">
                            <span class="post-author">
                                <img src="images/ava.jpg" alt="User Image">
                                ${data.author || 'Anonymous'}
                            </span>
                            <span class="post-date">${new Date(data.date.toMillis()).toLocaleString()}</span>
                        </div>
                        <h3 class="post-title">${data.title}</h3>
                        <div class="post-body">
                            <img src="${data.imageUrl || 'images/default-avatar.jpg'}" alt="Post Image">
                        </div>
        
                        <div class="likes-count">
                        <span id="like-count-${data.id}">
                            <i class="fas fa-heart"></i> ${data.likes ? data.likes.length  : 0} Likes
                        </span>
                    </div>
        
                        <div class="comments-section">
                            <h4>Comments:</h4>
                            <div id="comments-${data.id}" class="comments-list">${commentsHtml}</div>
                            <div class="comment-input-container">
                                <textarea id="comment-body-${data.id}" placeholder="Add a comment..." rows="3"></textarea>
                                <button class="add-comment-btn" onclick="addComment('${data.id}')">Add Comment</button>
                            </div>
                        </div>`;
                    contentDiv.appendChild(postElement);
                });
            });
        };
        
        const fetchComments = async (postId) => {
            const commentsRef = collection(db, 'crowdsourcing', postId, 'comments');
            const querySnapshot = await getDocs(commentsRef);
            let commentsHtml = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const userId = data.userId || 'Anonymous';
                const username = data.username || 'Anonymous';  // Use username if available, else set 'Anonymous'
        
                let commentActions = '';
                if (auth.currentUser && auth.currentUser.uid === data.userId) {
                    commentActions = 
                        `<div class="comment-actions">
          
                        </div>`;
                }
        
                commentsHtml += 
                    `<div class="comment" id="comment-${doc.id}">
                        <div class="comment-header">
                            <img src="images/User.png" alt="Author Image" class="comment-author-image">
                            <span class="comment-author">${username}</span>
                        </div>
                        <p class="comment-body">${data.comment}</p>
                        <span class="comment-date">${new Date(data.date.seconds * 1000).toLocaleString()}</span>
                        ${commentActions}
                    </div>`;
            });
        
            return commentsHtml;
        };
        
        window.addComment = async (postId) => {
            const commentBody = document.getElementById(`comment-body-${postId}`).value;
            if (!commentBody) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Empty Comment',
                    text: 'Please write a comment.',
                });
                return;
            }
        
            const user = auth.currentUser;
            const userId = user ? user.uid : 'Anonymous';
        
            let username = 'Anonymous'; // Default to 'Anonymous'
        
            if (user && user.displayName) {
                const nameParts = user.displayName.split(' ');
                const firstName = nameParts[0];
                const lastName = nameParts.length > 1 ? nameParts.slice(1).join(' ') : ''; 
                username = `${firstName} ${lastName}`.trim(); // Concatenate first and last name
            }
        
            const commentData = {
                comment: commentBody,
                postId: postId,
                userId: userId,
                username: username,  // Add username here
                date: serverTimestamp()
            };
        
            await addDoc(collection(db, "crowdsourcing", postId, "comments"), commentData);
        
            Swal.fire({
                icon: 'success',
                title: 'Comment Added',
                text: 'Your comment has been added successfully!',
            });
        
            document.getElementById(`comment-body-${postId}`).value = '';
            const commentsHtml = await fetchComments(postId);
            document.getElementById(`comments-${postId}`).innerHTML = commentsHtml; 
        };
        
        window.upvotePost = async (postId) => {
            const user = auth.currentUser;
            if (!user) {
                Swal.fire({
                    icon: 'info',
                    title: 'Login Required',
                    text: 'You need to be logged in to upvote.',
                });
                return;
            }
        
            const userVoteRef = collection(db, "user_votes");
            const q = query(userVoteRef, where("userId", "==", user.uid), where("postId", "==", postId));
            const querySnapshot = await getDocs(q);
        
            if (!querySnapshot.empty) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Already Voted',
                    text: 'You have already voted on this post.',
                });
                return;
            }
        
            await addDoc(userVoteRef, { userId: user.uid, postId: postId });
        
            const postRef = doc(db, "crowdsourcing", postId);
            await updateDoc(postRef, { votes: increment(1) });
        
            Swal.fire({
                icon: 'success',
                title: 'Vote Recorded',
                text: 'Your vote has been recorded successfully!',
            });
        
            const voteCountSpan = document.getElementById(`like-count-${postId}`);
            voteCountSpan.textContent = `${parseInt(voteCountSpan.textContent) + 1}`;
        };
        
        window.deleteComment = async (commentId) => {
            Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, delete it!',
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const commentRef = doc(db, "crowdsourcing", postId, "comments", commentId);
                    await deleteDoc(commentRef);
                    Swal.fire({
                        icon: 'success',
                        title: 'Deleted!',
                        text: 'Your comment has been deleted.',
                    });
                    const commentElem = document.getElementById(`comment-${commentId}`);
                    commentElem.remove();
                }
            });
        };
        
        const checkUserVoteStatus = async (postId) => {
            const user = auth.currentUser;
            if (!user) return;
        
            const userVoteRef = collection(db, "user_votes");
            const q = query(userVoteRef, where("userId", "==", user.uid), where("postId", "==", postId));
            const querySnapshot = await getDocs(q);
        
            if (!querySnapshot.empty) {
                const upvoteBtn = document.getElementById(`upvote-btn-${postId}`);
                upvoteBtn.disabled = true;
                upvoteBtn.textContent = 'Already Voted';
            }
        };
        
        fetchContent();
    </script>
    
    </body>
