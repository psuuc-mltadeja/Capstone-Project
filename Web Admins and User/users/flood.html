<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityInsight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
        }
        
        .sidebar {
            position: fixed;
            z-index: 100;
            width: 250px;
            height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar a {
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px 0;
            font-size: 18px;
        }

        .sidebar a:hover {
            color: #1da1f2;
        }

        .sidebar a i {
            margin-right: 10px;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: bold;
            color: #1da1f2;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .logout {
            color: #1da1f2;
            cursor: pointer;
        }

        .sidebar #active {
            color: #1da1f2;
            font-weight: bold;
        }

        #map {
            height: 100vh;
            width: calc(100% - 250px);
            background-color: #eaeaea;
            position: relative;
            right: -250px;
        }

        .add-button {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #1da1f2;
            border: none;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 17px;
            text-decoration: none;
            height: 50px; 
        }
        
        .add-button:hover {
            background-color: #148cc0;
        }
    </style>
</head>
<body>
  
    <div class="sidebar">
        <div>
        <div class="logo" onclick="window.location.href='home.html';">
            <span style="color: white">City</span>Insight
        </div>
        <a href="posttext.html" class="add-button">
            <i class="fas fa-plus-circle"></i>&nbsp; CREATE POST
        </a>
        <a href="home.html" id="active">
            <i class="fa fa-users"></i>&nbsp; Community
        </a>
        <a href="profile.html">
            <i class="fas fa-user"></i>&nbsp; Profile
        </a>
  
        <a href="crimes.html">
            <i class="fas fa-exclamation-triangle"></i>&nbsp; Crimes
        </a>
  
        <a href="flood.html">
            <i class="fas fa-water"></i>&nbsp; Flood
        </a>
        <a href="evacs.html">
            <i class="fas fa-map"></i>&nbsp; Evacuation Area
        </a>
        <a href="hospitals.html">
            <i class="fas fa-map"></i>&nbsp; Hospitals
        </a>
     
        <a href="reports.html">
          <i class="fas fa-exclamation-triangle"></i>&nbsp; Reports
      </a>
      
        <a href="about.html">
            <i class="fas fa-info-circle"></i>&nbsp; About
        </a>
        <a href="add-testimonial.html">
          <i class="fas fa-share"></i>&nbsp; Share your experience to us
      </a>
        <a href="login.html">
            <i class="fas fa-sign-out-alt"></i>&nbsp; Logout
        </a>
        </div>
    </div>
  
    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-firestore-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCYF9a_WvqUwBULYc8MXos_nba-_mrW17U",
        authDomain: "cityinsight-61c09.firebaseapp.com",
        projectId: "cityinsight-61c09",
        storageBucket: "cityinsight-61c09.appspot.com",
        messagingSenderId: "230924032629",
        appId: "1:230924032629:web:5b0b7e10e88959a3db763c",
        measurementId: "G-VV7WJRCEZ0"
      };

      const app = firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>

    <script>
      // Initialize the map
      var map = L.map('map').setView([15.9805, 120.5581], 13);

      // Add OpenStreetMap tile layer
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
      }).addTo(map);

      // Define custom marker icon
      const customIcon = L.icon({

        iconUrl: 'https://www.pngkit.com/png/full/28-286293_blue-map-pin-blue-google-maps-marker.png', // Custom icon URL
        iconSize: [30, 45], // Icon size
        iconAnchor: [15, 45], // Anchor point
        popupAnchor: [0, -45] // Popup position relative to icon
      });

      // Fetch flood data and add markers
      db.collection("floods").get().then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const lat = data.latitude;
            const lng = data.longitude;
            const brgy = data.brgy;
            const date = data.date; 
            const details = data.details;

            const popupContent = 
            '<div class="info_content">' +
            '<h2 style="color: #1da1f2; text-align: center; margin-bottom: 10px;">Flood Reports</h2>' +
            '<h3 style="margin: 0;"><strong>Barangay Affected:</strong> ' + brgy + ' </h3>' +
            '<p style="margin: 0; padding: 0;"><strong>Details:</strong> ' + details + '</p>' +  
            '<p style="margin: 0; padding: 0;"><strong>Date Tagged:</strong> ' + date + '</p>' + 
            '</div>';

            L.marker([lat, lng], { icon: customIcon }).addTo(map)
                .bindPopup(popupContent);
        });
      }).catch((error) => {
          console.error("Error fetching data: ", error);
      });
    </script>
</body>
</html>
